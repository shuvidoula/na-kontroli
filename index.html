<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="НА-КОНТРОЛІ">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#4f5b35">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data:; manifest-src 'self'; worker-src 'self'; connect-src 'none'; navigate-to 'self' blob:; base-uri 'none'; form-action 'none';">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="vendor/framework7/framework7-bundle.min.css">
  <link rel="stylesheet" href="src/css/app.css">
  <title>НА-КОНТРОЛІ</title>
</head>
<body>
  <div id="app">
    <div id="loginScreen" class="screen screen-login">
      <div class="login-wrap">
        <div class="brand-row">
          <div class="app-mark">НК</div>
          <div>
            <h1>НА-КОНТРОЛІ</h1>
            <p id="loginHint">Нове сховище і PIN.</p>
          </div>
        </div>

        <div class="login-card">
          <div id="storageList" class="storage-list"></div>

          <div id="activeStorage" class="storage-box">
            <span>Сховище</span>
            <strong id="activeStorageName">-</strong>
          </div>

          <label id="storageNameLabel" class="field-label">Назва сховища
            <input id="storageNameInput" type="text" autocomplete="username" maxlength="36" placeholder="Наприклад: Бункер здорового глузду">
          </label>

          <div id="pinStatus" class="pin-status">PIN вводиться приховано</div>
          <div id="pinKeys" class="pin-keys"></div>

          <div class="login-actions">
            <small>Дані відкриваються тільки після PIN на цьому пристрої.</small>
            <button id="continueStorageBtn" class="button button-fill" type="button">Далі</button>
            <button id="resetCreatePinBtn" class="button button-outline" type="button">Створити PIN заново</button>
            <button id="cancelCreateStorageBtn" class="button button-outline danger-link" type="button">Видалити це сховище</button>
            <button id="createStorageBtn" class="button button-outline" type="button">Нове сховище</button>
            <button id="backToStoragesBtn" class="button button-outline" type="button">До списку сховищ</button>
            <button id="logoutLoginBtn" class="button button-outline" type="button">Вийти / змінити сховище</button>
          </div>
        </div>
      </div>
    </div>

    <div id="mainScreen" class="screen screen-app" hidden>
      <header class="app-header">
        <div class="brand-mini">
          <div class="app-mark small">НК</div>
          <div class="brand-copy">
            <div class="title">НА-КОНТРОЛІ</div>
            <div id="currentStorageName" class="subtitle"></div>
          </div>
        </div>
        <button id="moreBtn" class="icon-button" type="button" aria-label="Меню">⋮</button>
        <div id="serviceMenu" class="service-menu" hidden>
          <button id="doneMenuBtn" type="button">Виконані</button>
          <button id="settingsMenuBtn" type="button">Налаштування</button>
          <button id="logoutBtn" type="button">Вихід</button>
        </div>
      </header>

      <main class="app-main">
        <section id="tasksPage" class="app-page"></section>
        <section id="taskPage" class="app-page" hidden></section>
        <section id="donePage" class="app-page" hidden></section>
        <section id="guidePage" class="app-page" hidden></section>
        <section id="updatesPage" class="app-page" hidden></section>
        <section id="settingsPage" class="app-page" hidden></section>
        <section id="archivePage" class="app-page" hidden></section>
      </main>

      <nav class="app-tabbar" aria-label="Основне меню">
        <button id="navMine" type="button" class="tab-link">Мої</button>
        <button id="navDelegated" type="button" class="tab-link">Іншим</button>
        <button id="navNew" type="button" class="tab-link nav-plus">+</button>
        <button id="navAll" type="button" class="tab-link">Всі</button>
        <button id="navGuide" type="button" class="tab-link">Довідник</button>
      </nav>
    </div>

    <div id="taskPopup" class="task-modal" role="dialog" aria-modal="true" aria-labelledby="taskPopupTitle">
      <div class="task-sheet">
        <div class="task-sheet-head">
          <h2 id="taskPopupTitle">Нова задача</h2>
          <button id="closeTaskPopup" class="icon-button" type="button" aria-label="Закрити">x</button>
        </div>
        <div class="popup-content">
          <form id="taskForm" class="task-form">
            <input id="taskId" type="hidden">
            <label class="field-label">Задача
              <input id="taskTitle" type="text" required maxlength="140" placeholder="Що зробити">
            </label>
            <div class="form-grid">
              <label class="field-label">Дата
                <input id="taskDate" type="date" required>
              </label>
              <label class="field-label">Час
                <input id="taskTime" type="time">
              </label>
            </div>
            <label class="field-label">Тег
              <select id="taskTag">
                <option value="">Без тегу</option>
                <option value="personal">Особисте</option>
                <option value="control">На контролі</option>
                <option value="urgent">Терміново</option>
              </select>
              <span class="tag-help">О - особисте, К - на контролі, Т - терміново</span>
            </label>
            <details class="delegate-box">
              <summary>Доручити задачу підлеглому</summary>
              <label class="field-label">Кому доручена задача
                <input id="taskAssignee" type="text" maxlength="80" placeholder="Ім'я / підрозділ">
              </label>
            </details>
            <label class="field-label">Примітка
              <textarea id="taskNote" maxlength="900" placeholder="Коротко"></textarea>
            </label>
            <label class="field-label">Етапи
              <textarea id="taskItems" class="hidden-stage-textarea" placeholder="Кожен етап з нового рядка"></textarea>
            </label>
            <div class="stage-editor-wrap">
              <div id="taskStageEditor" class="stage-editor"></div>
              <div class="add-stage edit-stage-add">
                <input id="taskStageDraft" type="text" placeholder="Додати етап">
                <button id="addFormStage" class="button button-outline" type="button">+</button>
              </div>
            </div>
          </form>
        </div>
        <div class="form-actions task-sheet-actions">
          <button class="button button-fill" type="submit" form="taskForm">Зберегти</button>
          <button id="cancelTask" class="button button-outline" type="button">Скасувати</button>
        </div>
      </div>
    </div>

    <div id="createChoicePopup" class="choice-modal" role="dialog" aria-modal="true" aria-labelledby="createChoiceTitle">
      <div class="choice-sheet">
        <div class="choice-head">
          <h2 id="createChoiceTitle">Нова подія</h2>
          <button id="closeCreateChoice" class="icon-button" type="button" aria-label="Закрити">x</button>
        </div>
        <div class="choice-actions">
          <button id="quickCreateBtn" class="button button-fill" type="button">ШВИДКА</button>
          <button id="fullCreateBtn" class="button button-outline" type="button">ПОВНА</button>
        </div>
      </div>
    </div>

    <div id="quickTaskPopup" class="task-modal" role="dialog" aria-modal="true" aria-labelledby="quickTaskPopupTitle">
      <div class="task-sheet">
        <div class="task-sheet-head">
          <h2 id="quickTaskPopupTitle">Швидка задача</h2>
          <button id="closeQuickTaskPopup" class="icon-button" type="button" aria-label="Закрити">x</button>
        </div>
        <div class="popup-content">
          <form id="quickTaskForm" class="task-form">
            <label class="field-label">Дата
              <input id="quickTaskDate" type="date" required>
            </label>
            <label class="field-label">Один рядок
              <input id="quickTaskLine" type="text" maxlength="240" placeholder="14:30 перевірити звʼязок. коротка примітка">
            </label>
            <div class="quick-tags" role="group" aria-label="Тег задачі">
              <button class="quick-tag personal" type="button" data-quick-tag="personal">О</button>
              <button class="quick-tag control" type="button" data-quick-tag="control">К</button>
              <button class="quick-tag urgent" type="button" data-quick-tag="urgent">Т</button>
              <button class="quick-tag active" type="button" data-quick-tag="">Без тегу</button>
            </div>
            <div class="tag-help">О - особисте, К - на контролі, Т - терміново</div>
            <label class="field-label">Примітка
              <textarea id="quickTaskNote" maxlength="1600" placeholder="Вставте повний текст повідомлення або деталі задачі"></textarea>
            </label>
          </form>
        </div>
        <div class="form-actions task-sheet-actions">
          <button class="button button-fill" type="submit" form="quickTaskForm">Створити</button>
          <button id="cancelQuickTask" class="button button-outline" type="button">Скасувати</button>
        </div>
      </div>
    </div>

    <div id="exchangePopup" class="task-modal" role="dialog" aria-modal="true" aria-labelledby="exchangePopupTitle">
      <div class="task-sheet">
        <div class="task-sheet-head">
          <h2 id="exchangePopupTitle">Обмін</h2>
          <button id="closeExchangePopup" class="icon-button" type="button" aria-label="Закрити">x</button>
        </div>
        <div class="popup-content">
          <label id="exchangeTextBox" class="field-label">Бекап
            <textarea id="exchangeText" placeholder="JSON резервної копії"></textarea>
          </label>
          <div id="transferCompleteBox" class="transfer-complete">
            <label class="field-label">Кому передано
              <input id="transferRecipientInput" type="text" maxlength="80" placeholder="Ім'я / підрозділ">
            </label>
            <button id="finishTransferBtn" class="button button-outline" type="button">Завершити передачу</button>
          </div>
        </div>
        <div class="form-actions task-sheet-actions">
          <button id="copyExchangeBtn" class="button button-fill" type="button">Копіювати</button>
        </div>
      </div>
    </div>

    <input id="importFile" class="hidden-file" type="file" accept="application/json,.json">
    <div id="appToast" class="app-toast"></div>
  </div>

  <script src="vendor/framework7/framework7-bundle.min.js"></script>
  <script src="src/js/crypto.js"></script>
  <script src="src/js/storage.js"></script>
  <script src="src/js/app.js"></script>
</body>
</html>
